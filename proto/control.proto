syntax = "proto3";

package com.project.control;

option go_package = "github.com/Vancheszz/android-agent/internal/control";

message NidhoggRequest {
  oneof payload {
    TapCommand tap = 1;
    SwipeCommand swipe = 2;
    CropRequest crop = 3;
  }
}

message TapCommand {
  int32 x = 1;
  int32 y = 2;
}

message SwipeCommand {
  int32 x1 = 1;
  int32 y1 = 2;
  int32 x2 = 3;
  int32 y2 = 4;
  int32 duration_ms = 5; 
}

message CropRequest {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}


message NidhoggResponse {
  bool success = 1;
  string error_msg = 2;
  
  oneof data {
    bytes image_data = 3;
  }
}